<div class="auth-container bg-surface text-on-surface flex min-h-screen lg:grid lg:grid-cols-2">
  @if (isLoginMode()) {
    <app-login-form (toggleMode)="toggleMode()" (inProgress)="onInProgress($event)" />
    <app-login-showcase />
  } @else {
    <app-register-showcase />
    <app-register-form (toggleMode)="toggleMode()" (inProgress)="onInProgress($event)" />
  }
</div>
