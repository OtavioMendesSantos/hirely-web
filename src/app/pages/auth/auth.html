<div class="auth-container">
  <section hlmCard class="auth-box w-full max-w-md mx-auto p-6 shadow-lg bg-card">
    <div hlmCardHeader class="auth-header mb-4">
      <h3 hlmCardTitle class="text-xl font-bold text-center">{{ isLoginMode() ? 'Entrar no Sistema' : 'Criar Nova Conta' }}</h3>
    </div>

    <div hlmCardContent>
      @if (isLoginMode()) {
      <form (ngSubmit)="onLogin()" class="auth-form flex flex-col gap-4">
        <div class="flex flex-col gap-1.5">
          <label hlmLabel for="login-email">E-mail</label>
          <input hlmInput id="login-email" type="email" [(ngModel)]="email" name="email" required />
        </div>

        <div class="flex flex-col gap-1.5">
          <label hlmLabel for="login-password">Senha</label>
          <input hlmInput id="login-password" type="password" [(ngModel)]="password" name="password" required />
        </div>

        <button hlmBtn variant="default" type="submit" class="w-full mt-2 submit-btn">
          Entrar
        </button>
      </form>
      <p class="toggle-text mt-4 text-center text-sm text-muted-foreground">Não tem uma conta? <a (click)="toggleMode()" class="text-primary hover:underline cursor-pointer font-medium">Cadastre-se aqui</a></p>
      } @else {
      <form (ngSubmit)="onRegister()" class="auth-form flex flex-col gap-4">
        <div class="flex flex-col gap-1.5">
          <label hlmLabel for="reg-name">Nome Completo</label>
          <input hlmInput id="reg-name" type="text" [(ngModel)]="name" name="name" required />
        </div>

        <div class="flex flex-col gap-1.5">
          <label hlmLabel for="reg-email">E-mail</label>
          <input hlmInput id="reg-email" type="email" [(ngModel)]="email" name="email" required />
        </div>

        <div class="flex flex-col gap-1.5">
          <label hlmLabel for="reg-password">Senha</label>
          <input hlmInput id="reg-password" type="password" [(ngModel)]="password" name="password" required />
        </div>

        <button hlmBtn variant="default" type="submit" class="w-full mt-2 submit-btn">
          Criar Conta
        </button>
      </form>
      <p class="toggle-text mt-4 text-center text-sm text-muted-foreground">Já tem uma conta? <a (click)="toggleMode()" class="text-primary hover:underline cursor-pointer font-medium">Faça login aqui</a></p>
      }
    </div>
  </section>
</div>
