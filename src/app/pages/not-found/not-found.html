<div class="not-found-container">
  <section hlmCard class="not-found-card w-full max-w-lg mx-auto p-8 shadow-lg bg-card text-center flex flex-col items-center">
    <div hlmCardContent class="card-content flex flex-col items-center p-0">
      <div class="error-code">404</div>
      <h1 class="error-title text-2xl font-bold mb-2">Página não encontrada</h1>
      <p class="error-description text-muted-foreground mb-6 max-w-md">
        Desculpe, mas não conseguimos encontrar a página que você está procurando. Ela pode ter sido removida, renomeada ou está temporariamente indisponível.
      </p>
      <div class="action-buttons flex justify-center w-full">
        <a hlmBtn variant="default" routerLink="/" class="inline-flex items-center gap-2 px-6 py-2">
          <ng-icon name="lucideHome" class="text-base" />
          Voltar para o início
        </a>
      </div>
    </div>
  </section>
</div>
