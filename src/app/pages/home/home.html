<div class="min-h-screen flex flex-col bg-surface text-on-surface relative overflow-hidden">
  <app-header />
  
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-20">
    <svg class="absolute w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="home-grid-pattern" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#dc2626" stroke-width="0.8" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#home-grid-pattern)" />
    </svg>
  </div>

  <!-- Hero Section & Landing Content -->
  <main class="flex-grow flex flex-col items-center justify-center px-6 sm:px-12 md:px-20 text-center py-20 z-10 relative">
    <p class="sr-only">home works!</p>
    <div class="max-w-4xl mx-auto flex flex-col items-center">
      <!-- Headline -->
      <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-heading font-black text-on-surface tracking-tight leading-[1.1] mb-6">
        The Definitive Platform for <span class="text-primary">Professional Recruitment</span>
      </h1>

      <!-- Subheading -->
      <p class="text-base sm:text-lg md:text-xl text-on-surface-variant max-w-2xl mx-auto leading-relaxed mb-10">
        Streamline candidate tracking, manage multi-stage recruitment pipelines with precision, and land your dream job with absolute clarity and focus.
      </p>

      <!-- CTAs utilizando hlmBtn do Spartan -->
      <div class="flex flex-col sm:flex-row gap-4 items-center justify-center w-full sm:w-auto">
        @if (isLoggedIn()) {
        <a
          hlmBtn
          size="lg"
          routerLink="/dashboard"
          class="w-full sm:w-auto px-8 py-6 font-semibold text-sm shadow-md transition-all hover:scale-[1.02] cursor-pointer"
        >
          Go to Dashboard
        </a>
        } @else {
        <a
          hlmBtn
          size="lg"
          routerLink="/auth"
          [queryParams]="{ mode: 'register' }"
          class="w-full sm:w-auto px-8 py-6 font-semibold text-sm shadow-md transition-all hover:scale-[1.02] cursor-pointer"
        >
          Get Started Free
        </a>
        <a
          hlmBtn
          variant="outline"
          size="lg"
          routerLink="/dashboard"
          class="w-full sm:w-auto px-8 py-6 font-semibold text-sm shadow-sm transition-all cursor-pointer"
        >
          Explore Dashboard
        </a>
        }
      </div>
    </div>
  </main>
  <app-footer />
</div>
