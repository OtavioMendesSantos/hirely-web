<hlm-sidebar variant="sidebar" collapsible="icon">
  <div
    hlmSidebarHeader
    class="border-border-subtle !h-14 shrink-0 !flex-row items-center border-b !px-2 !py-0"
  >
    <ul hlmSidebarMenu class="m-0 flex w-full list-none items-center p-0">
      <li hlmSidebarMenuItem class="flex w-full list-none">
        <a
          routerLink="/dashboard"
          hlmSidebarMenuButton
          size="lg"
          class="hover:bg-sidebar-accent group/logo flex cursor-pointer items-center gap-2.5 transition-colors"
        >
          <div
            class="bg-primary/10 border-primary/20 text-primary flex size-8 shrink-0 items-center justify-center rounded-lg border font-bold shadow-xs transition-transform group-hover/logo:scale-105"
          >
            <img src="hirely_logo.png" alt="Hirely Logo" class="size-6 object-contain" />
          </div>
          <div class="flex flex-1 items-center justify-between overflow-hidden">
            <span class="font-heading text-on-surface truncate text-base font-bold tracking-tight"
              >Hirely</span
            >
          </div>
        </a>
      </li>
    </ul>
  </div>

  <div hlmSidebarContent>
    <!-- Main Actions / Nav Group -->
    <div hlmSidebarGroup>
      <ul hlmSidebarMenu class="m-0 list-none gap-1.5 p-0">
        <!-- New Candidate CTA Button -->
        <li hlmSidebarMenuItem class="list-none">
          <a
            hlmSidebarMenuButton
            routerLink="/dashboard"
            [queryParams]="{ action: 'new' }"
            class="bg-primary text-on-primary hover:bg-primary/90 hover:text-on-primary active:bg-primary/80 active:text-on-primary data-active:bg-primary data-active:text-on-primary group/cta flex items-center gap-2.5 rounded-md font-semibold shadow-sm transition-all duration-150 group-data-[collapsible=icon]:!size-8 group-data-[collapsible=icon]:!p-2"
          >
            <div
              class="bg-on-primary/20 text-on-primary flex size-6 shrink-0 items-center justify-center rounded-md group-data-[collapsible=icon]:size-4 group-data-[collapsible=icon]:bg-transparent"
            >
              <ng-icon name="lucidePlus" class="size-4 shrink-0" />
            </div>
            <span class="font-heading tracking-wide group-data-[collapsible=icon]:hidden"
              >New Candidate</span
            >
          </a>
        </li>

        <!-- Dashboard Item -->
        <li hlmSidebarMenuItem class="list-none">
          <a
            hlmSidebarMenuButton
            routerLink="/dashboard"
            routerLinkActive="bg-sidebar-accent text-primary font-semibold shadow-xs"
            [routerLinkActiveOptions]="{ exact: true }"
            class="text-on-surface-variant hover:text-on-surface flex items-center gap-2.5 transition-colors group-data-[collapsible=icon]:!p-2"
          >
            <ng-icon name="lucideLayoutDashboard" class="text-primary/80 size-4 shrink-0" />
            <span class="group-data-[collapsible=icon]:hidden">Dashboard</span>
          </a>
        </li>

        <!-- Metrics Item -->
        <li hlmSidebarMenuItem class="list-none">
          <a
            hlmSidebarMenuButton
            routerLink="/metrics"
            routerLinkActive="bg-sidebar-accent text-primary font-semibold shadow-xs"
            class="text-on-surface-variant hover:text-on-surface flex items-center gap-2.5 transition-colors group-data-[collapsible=icon]:!p-2"
          >
            <ng-icon name="lucideActivity" class="text-primary/80 size-4 shrink-0" />
            <span class="group-data-[collapsible=icon]:hidden">Metrics</span>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <div hlmSidebarFooter class="border-border-subtle/60 relative border-t">
    <app-user-menu variant="sidebar" side="top" align="start" />
  </div>
</hlm-sidebar>
